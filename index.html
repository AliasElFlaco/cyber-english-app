<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber English | Roadmap de Fluidez</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- NAVBAR GALÁCTICA CORREGIDA -->
    <nav class="galaxy-nav">
      <div class="nav-logo">CYBER<span>ENGLISH</span></div>
      <div class="nav-links">
        <a href="#" class="active">Misión Actual</a>
        <a href="#">Rendimiento</a>
        <a href="#">Bitácora</a>
      </div>
      <div class="user-status">🧑‍🚀 CADETE</div>
    </nav>

    <!-- ESPACIO DE BIENVENIDA Y ROADMAP -->
    <main class="roadmap-space">
      <!-- CABECERA PRINCIPAL -->
      <header class="roadmap-header">
        <h1 class="hero-title">
          CYBERENGLISH: Tu Camino de 24 Semanas hacia la Fluidez Nativa
        </h1>
        <p class="hero-subtitle">
          Aceleración de 24 semanas, diseñada para la fluidez real a través del
          condicionamiento muscular y conversión de vocabulario de alta
          velocidad.
        </p>
      </header>

      <!-- SECCIÓN DE FASES -->
      <section class="roadmap-section">
        <h2 class="section-title">El Roadmap de Clases de 6 Meses</h2>

        <!-- Contenedor dinámico donde el MVC inyectará las 3 fases de cristal líquido -->
        <div id="roadmap-container" class="phases-grid">
          <!-- Se poblará dinámicamente mediante la Vista con el código de model.js -->
        </div>
      </section>

      <!-- BOTÓN DE ACCIÓN PRINCIPAL CÓSMICO -->
      <footer class="roadmap-footer">
        <button id="start-mission-btn" class="btn-galaxy-action">
          ¡Quiero Comenzar Mi Clase! ➔
        </button>
      </footer>
    </main>

    <!-- ARQUITECTURA MVC -->
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
